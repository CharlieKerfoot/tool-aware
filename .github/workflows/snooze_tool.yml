name: Snooze Tool

on:
  workflow_dispatch:
    inputs:
      tool:
        description: "Tool name"
        required: true
      url:
        description: "Tool URL"
        required: true
      weeks:
        description: "Weeks to snooze"
        required: false
        default: "2"

permissions:
  contents: write

jobs:
  snooze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Add snooze
        run: uv run python -m src.snooze --add "${{ inputs.tool }}" "${{ inputs.url }}" "${{ inputs.weeks }}"

      - name: Commit snooze.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/snooze.json
          git commit -m "Snooze: ${{ inputs.tool }} for ${{ inputs.weeks }}w"
          git push
